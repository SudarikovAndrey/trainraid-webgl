<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Boss</title>
    <style>
        body { padding: 0; margin: 0; background: #357C46; }
        #unity-container { position: absolute; width: 960px; height: 600px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #unity-canvas { width: 960px; height: 600px; background: #357C46; }
        #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #unity-logo { width: 154px; height: 130px; margin: 0 auto; }
        #unity-progress-bar-empty { width: 141px; height: 18px; margin: 10px auto 0; border: 1px solid #555; border-radius: 9px; overflow: hidden; }
        #unity-progress-bar-full { width: 0%; height: 100%; background: #555; transition: width 0.1s; }
        /* FIX v27.1: футер в правый нижний угол — раньше перекрывал игровые
           кнопки (ДАЛЬШЕ/СВАЛИТЬ/СУПЕР) по центру и перехватывал клики. */
        #unity-footer { position: absolute; bottom: 10px; right: 12px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        #unity-footer button, #unity-footer select { padding: 6px 12px; cursor: pointer; font-size: 14px; border: 1px solid #555; border-radius: 4px; background: rgba(0,0,0,0.5); color: #fff; }
        #unity-footer button:hover, #unity-footer select:hover { background: rgba(0,0,0,0.7); }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width=960 height=600></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-footer" style="display: none;">
            <select id="unity-resolution">
                <option value="800x600">800 × 600</option>
                <option value="960x600">960 × 600</option>
                <option value="1280x720">1280 × 720</option>
                <option value="1366x768">1366 × 768</option>
                <option value="1920x1080">1920 × 1080</option>
            </select>
            <button id="unity-fullscreen">Fullscreen</button>
        </div>
    </div>
    <script src="Build/parts.js"></script>
    <script>
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/webgl_train.loader.js";
        var config = {
            dataUrl: null, // assembled from gzip parts below
            frameworkUrl: buildUrl + "/webgl_train.framework.js.unityweb",
            codeUrl: null, // assembled from gzip parts below
            streamingAssetsUrl: "StreamingAssets",
            companyName: "R2R Studio",
            productName: "Block Boss",
            productVersion: "1.42.0",
            autoSyncPersistentDataPath: true
        };

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var footer = document.querySelector("#unity-footer");
        var resolutionSelect = document.querySelector("#unity-resolution");
        var fullscreenBtn = document.querySelector("#unity-fullscreen");

        var initialWidth = 960;
        var initialHeight = 600;
        var resolutionSelectValue = initialWidth + "x" + initialHeight;
        if (resolutionSelect) {
            resolutionSelect.value = resolutionSelectValue;
            resolutionSelect.addEventListener("change", function() {
                if (!unityInstance) return;
                var parts = this.value.split("x");
                var w = parseInt(parts[0], 10);
                var h = parseInt(parts[1], 10);
                container.style.width = w + "px";
                container.style.height = h + "px";
                canvas.style.width = w + "px";
                canvas.style.height = h + "px";
                canvas.width = w;
                canvas.height = h;
            });
        }

        var unityInstance;
        fullscreenBtn.addEventListener("click", function() {
            if (unityInstance) unityInstance.SetFullscreen(1);
        });

        // Data & wasm are gzip-compressed by Unity and split into <100MB parts
        // for GitHub. The browser reassembles and decompresses them natively
        // via DecompressionStream. Asset bytes are unchanged.
        if (typeof DecompressionStream === "undefined") {
            alert("Your browser is too old to run this game. Please update it.");
        }

        function fetchGunzip(urls, base, weight) {
            var done = 0;
            return Promise.all(urls.map(function (u) {
                return fetch(u).then(function (r) {
                    if (!r.ok) throw "Failed to load " + u + " (" + r.status + ")";
                    return r.arrayBuffer();
                }).then(function (buf) {
                    done++;
                    progressBarFull.style.width = (base + weight * done / urls.length) + "%";
                    return buf;
                });
            })).then(function (bufs) {
                var ds = new DecompressionStream("gzip");
                return new Response(new Blob(bufs).stream().pipeThrough(ds)).blob();
            }).then(function (raw) {
                return URL.createObjectURL(raw);
            });
        }

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            Promise.all([
                fetchGunzip(DATA_PARTS, 0, 35),
                fetchGunzip(WASM_PARTS, 35, 10)
            ]).then((urls) => {
                config.dataUrl = urls[0];
                config.codeUrl = urls[1];
                return createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = (45 + 55 * progress) + "%";
            }); }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = "none";
                footer.style.display = "flex";
            }).catch((message) => {
                alert("Unity Error: " + message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
